<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео | Йога Будни</title>
    <link rel="icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0c0c0c;--surface:#161616;--accent:#a0b87a;--text:#e8e6e1;--muted:#7a7870}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        a{color:var(--accent);text-decoration:none}

        .hd{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;width:100%}
        .br{display:flex;align-items:center;gap:10px}.bi{font-size:24px}.bn{font-size:16px;font-weight:600;letter-spacing:-.3px}.bt{color:var(--muted);font-size:13px}
        .hb{background:none;border:1px solid #2a2a2a;color:var(--muted);border-radius:8px;padding:7px 14px;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;transition:all .2s}
        .hb:hover{border-color:var(--accent);color:var(--text)}

        .video-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 24px}
        .video-container{width:100%;max-width:1100px;position:relative;padding-top:56.25%;background:#000;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .video-container iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

        .footer{text-align:center;padding:24px;color:var(--muted);font-size:12px;border-top:1px solid #1a1a1a}
    </style>
</head>
<body>
    <header class="hd">
        <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)">
            <span class="bi">🕉</span>
            <div><div class="bn">Йога Будни</div><div class="bt">Вячеслав Эрдниев</div></div>
        </a>
        <a href="/" class="hb">← На главную</a>
    </header>

    <div class="video-wrap">
        <div class="video-container">
            <iframe src="https://vkvideo.ru/video_ext.php?oid=-233505984&id=456239019&hash=e13e5f73c459d77b&hd=4" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen></iframe>
        </div>
    </div>

    <footer class="footer">Йога Будни · Вячеслав Эрдниев · <a href="https://instagram.com/shat_karm" target="_blank">@shat_karm</a></footer>
</body>
</html>
