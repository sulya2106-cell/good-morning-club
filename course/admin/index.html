<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка курса | Йога Будни</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0c0c0c;--surface:#161616;--sh:#1e1e1e;--accent:#a0b87a;--ad:rgba(160,184,122,.12);--text:#e8e6e1;--muted:#7a7870;--r:14px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
        a{color:var(--accent);text-decoration:none}

        .wrap{max-width:800px;margin:0 auto;padding:24px}
        h1{font-size:24px;font-weight:700;margin-bottom:24px;letter-spacing:-.3px}
        h2{font-size:18px;font-weight:600;margin:32px 0 16px;color:var(--accent)}

        /* Login */
        .login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
        .login input{background:var(--surface);border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;font-size:15px;color:var(--text);outline:none;font-family:inherit;width:280px;text-align:center}
        .login input:focus{border-color:var(--accent)}

        /* Form */
        .form{background:var(--surface);border:1px solid #2a2a2a;border-radius:var(--r);padding:24px;margin-bottom:24px}
        .form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
        .form-row label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
        .form-row input,.form-row select{background:var(--sh);border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit;flex:1;min-width:150px}
        .form-row input:focus,.form-row select:focus{border-color:var(--accent)}

        .btn{background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
        .btn:hover{opacity:.85}
        .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
        .btn-danger{background:#d07070}

        /* Table */
        .table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
        .table th{text-align:left;padding:10px 8px;border-bottom:1px solid #2a2a2a;color:var(--muted);font-weight:500}
        .table td{padding:10px 8px;border-bottom:1px solid #1a1a1a}
        .code{background:var(--ad);color:var(--accent);padding:3px 8px;border-radius:5px;font-family:monospace;font-size:13px;font-weight:600}

        .msg{background:var(--ad);color:var(--accent);padding:12px 16px;border-radius:10px;margin:12px 0;font-size:14px;display:none}
        .msg.show{display:block}

        .back{color:var(--muted);font-size:13px;margin-bottom:20px;display:inline-block}
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div class="login" id="loginScreen">
        <h1>👑 Админка курса</h1>
        <input type="password" id="adminPass" placeholder="Пароль администратора" onkeydown="if(event.key==='Enter')adminLogin()">
        <button class="btn" onclick="adminLogin()">Войти</button>
    </div>

    <!-- Админка -->
    <div class="wrap" id="adminPanel" style="display:none">
        <a href="/course/" class="back">← К курсу</a>
        <h1>👑 Управление курсом</h1>

        <!-- Форма добавления -->
        <h2>Добавить ученика</h2>
        <div class="form">
            <div class="form-row">
                <div style="flex:2">
                    <label>Имя ученика</label>
                    <input type="text" id="newName" placeholder="Елена">
                </div>
                <div style="flex:1">
                    <label>Курс</label>
                    <select id="newCourse">
                        <option value="recovery">Восстановление тела (14 дн)</option>
                        <option value="fire">Внутренний огонь (30 дн)</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div style="flex:1">
                    <label>Дата старта</label>
                    <input type="date" id="newStart">
                </div>
                <div style="flex:1">
                    <label>Код (авто или свой)</label>
                    <input type="text" id="newCode" placeholder="Авто">
                </div>
            </div>
            <div style="margin-top:16px;display:flex;gap:12px;align-items:center">
                <button class="btn" onclick="addStudent()">Добавить ученика</button>
                <div class="msg" id="addMsg"></div>
            </div>
        </div>

        <!-- Список учеников -->
        <h2>Ученики</h2>
        <table class="table">
            <thead>
                <tr><th>Код</th><th>Имя</th><th>Курс</th><th>Старт</th><th>День</th><th></th></tr>
            </thead>
            <tbody id="studentList"></tbody>
        </table>
    </div>

    <script>
    const ADMIN_PASS = 'admin2026';

    // Check saved session
    if (localStorage.getItem('yb_admin') === 'true') showAdmin();

    function adminLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASS) {
            localStorage.setItem('yb_admin', 'true');
            showAdmin();
        }
    }

    function showAdmin() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        // Set default start date to today
        document.getElementById('newStart').value = new Date().toISOString().split('T')[0];
        renderStudents();
    }

    function getStudents() {
        const saved = localStorage.getItem('yb_students');
        return saved ? JSON.parse(saved) : {};
    }

    function saveStudents(students) {
        localStorage.setItem('yb_students', JSON.stringify(students));
    }

    function genCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
        return code;
    }

    function addStudent() {
        const name = document.getElementById('newName').value.trim();
        const course = document.getElementById('newCourse').value;
        const start = document.getElementById('newStart').value;
        let code = document.getElementById('newCode').value.trim().toUpperCase();

        if (!name) { showMsg('Введите имя'); return; }
        if (!start) { showMsg('Выберите дату старта'); return; }

        if (!code) code = genCode();

        const students = getStudents();
        if (students[code]) { showMsg('Такой код уже существует!'); return; }

        const days = course === 'fire' ? 30 : 14;
        students[code] = { name, start, course, days };
        saveStudents(students);

        showMsg('✅ Ученик добавлен! Код: ' + code);
        document.getElementById('newName').value = '';
        document.getElementById('newCode').value = '';
        renderStudents();
    }

    function removeStudent(code) {
        if (!confirm('Удалить ученика ' + code + '?')) return;
        const students = getStudents();
        delete students[code];
        saveStudents(students);
        renderStudents();
    }

    function renderStudents() {
        const students = getStudents();
        const defaults = { 'DEMO01': { name: 'Демо-ученик', start: '2026-04-15', course: 'recovery', days: 14 } };
        const all = {...defaults, ...students};
        const tbody = document.getElementById('studentList');
        const today = new Date();

        tbody.innerHTML = Object.entries(all).map(([code, s]) => {
            const start = new Date(s.start);
            const diff = Math.floor((today - start) / 86400000);
            const currentDay = Math.max(0, Math.min(diff + 1, s.days));
            const status = diff < 0 ? 'Ещё не начался' : (currentDay >= s.days ? 'Завершён' : 'День ' + currentDay + ' из ' + s.days);
            const courseName = s.course === 'fire' ? 'Внутренний огонь' : 'Восстановление тела';
            const isDefault = code === 'DEMO01';
            return '<tr><td><span class="code">' + code + '</span></td><td>' + s.name + '</td><td>' + courseName + '</td><td>' + s.start + '</td><td>' + status + '</td><td>' + (isDefault ? '' : '<button class="btn btn-sm btn-danger" onclick="removeStudent(\'' + code + '\')">Удалить</button>') + '</td></tr>';
        }).join('');
    }

    function showMsg(text) {
        const el = document.getElementById('addMsg');
        el.textContent = text;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }
    </script>
</body>
</html>
