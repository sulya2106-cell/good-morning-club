<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Йога Будни с Вячеславом</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        :root {
            --bg: #0c0c0c;
            --surface: #161616;
            --surface-hover: #1e1e1e;
            --accent: #a0b87a;
            --accent-light: #c5d9a4;
            --accent-dim: rgba(160, 184, 122, 0.12);
            --text: #e8e6e1;
            --text-muted: #7a7870;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
            background: radial-gradient(ellipse at 50% 30%, #141a10 0%, var(--bg) 70%);
        }

        .lock-screen.hidden { display: none; }
        .lock-logo { font-size: 56px; margin-bottom: 20px; filter: grayscale(30%); }
        .lock-title { font-size: 26px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.5px; }
        .lock-author { color: var(--accent); font-size: 15px; font-weight: 500; margin-bottom: 8px; }
        .lock-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; }

        .lock-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .lock-input {
            background: var(--surface);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            text-align: center;
            letter-spacing: 2px;
        }

        .lock-input:focus { border-color: var(--accent); }
        .lock-input::placeholder { color: var(--text-muted); letter-spacing: 0; }

        .lock-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .lock-btn:hover { opacity: 0.85; }
        .lock-error { color: #d07070; font-size: 13px; min-height: 20px; }

        .app { display: none; }
        .app.visible { display: block; }

        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 960px;
            margin: 0 auto;
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { font-size: 24px; }
        .brand-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
        .brand-tag { color: var(--text-muted); font-size: 13px; font-weight: 400; }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .access-badge {
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            background: none;
            border: 1px solid #2a2a2a;
            color: var(--text-muted);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .logout-btn:hover { border-color: var(--accent); color: var(--text); }

        .hero {
            text-align: center;
            padding: 48px 24px 32px;
            max-width: 600px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 38px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 14px;
            letter-spacing: -1px;
        }

        .hero h1 span { color: var(--accent); }

        .hero p {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 460px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .filters {
            display: flex;
            gap: 8px;
            padding: 0 24px;
            max-width: 960px;
            margin: 36px auto 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text-muted);
            border-radius: 100px;
            padding: 9px 18px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover { color: var(--text); background: var(--surface-hover); }
        .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 500; }
        .filter-btn.locked { opacity: 0.4; cursor: not-allowed; }
        .filter-btn.locked:hover { color: var(--text-muted); background: var(--surface); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            padding: 0 24px 80px;
            max-width: 960px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }

        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(0,0,0,0.5); }
        .card.is-locked { opacity: 0.5; pointer-events: none; }
        .card.is-locked .card-lock-overlay { display: flex; }

        .card-lock-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(12, 12, 12, 0.75);
            z-index: 5;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 6px;
        }

        .card-lock-icon { font-size: 28px; }
        .card-lock-text { font-size: 12px; color: var(--text-muted); }

        .card-video {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #0a0a0a;
        }

        .card-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .card-placeholder {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            background: linear-gradient(135deg, #121410 0%, #1a1c16 100%);
        }

        .card-body { padding: 14px 16px; }

        .card-tag {
            display: inline-block;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 9px;
            border-radius: 5px;
            margin-bottom: 7px;
        }

        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; line-height: 1.35; }
        .card-meta { color: var(--text-muted); font-size: 12px; display: flex; gap: 12px; }

        .empty { text-align: center; padding: 80px 24px; color: var(--text-muted); }
        .empty-icon { font-size: 44px; margin-bottom: 16px; }
        .empty-text { font-size: 14px; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.open { display: flex; }
        .modal { width: 100%; max-width: 800px; }

        .modal-video {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .modal-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-info { padding: 18px 0; }
        .modal-title { font-size: 19px; font-weight: 600; margin-bottom: 4px; }
        .modal-desc { color: var(--text-muted); font-size: 14px; }

        .modal-close {
            position: fixed;
            top: 20px; right: 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 32px;
            cursor: pointer;
            z-index: 101;
        }

        .modal-close:hover { color: var(--text); }

        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid #1a1a1a;
            max-width: 960px;
            margin: 0 auto;
        }

        .footer a { color: var(--accent); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 28px; }
            .grid { grid-template-columns: 1fr; }
            .hero { padding: 32px 20px 20px; }
            .header-right { gap: 6px; }
            .access-badge { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
    <div class="lock-logo">🕉</div>
    <div class="lock-title">Йога Будни</div>
    <div class="lock-author">с Вячеславом Эрдниевым</div>
    <div class="lock-subtitle">Закрытая библиотека практик - вход по паролю</div>
    <form class="lock-form" onsubmit="return tryLogin()">
        <input type="password" class="lock-input" id="passwordInput" placeholder="Пароль" autocomplete="off">
        <button type="submit" class="lock-btn">Войти</button>
        <div class="lock-error" id="lockError"></div>
    </form>
</div>

<div class="app" id="app">
    <header class="header">
        <div class="brand">
            <span class="brand-icon">🕉</span>
            <div>
                <div class="brand-name">Йога Будни</div>
                <div class="brand-tag">Вячеслав Эрдниев</div>
            </div>
        </div>
        <div class="header-right">
            <span class="access-badge" id="accessBadge"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </header>

    <section class="hero">
        <h1>Практика <span>без лишнего</span></h1>
        <p>Хатха-йога, шаткармы, восстановление тела. Только то, что работает - проверено на себе.</p>
    </section>

    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>

    <footer class="footer">
        Йога Будни · Вячеслав Эрдниев · <a href="https://instagram.com/shat_karm" target="_blank">@shat_karm</a>
    </footer>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal">
        <div class="modal-video" id="modalVideo"></div>
        <div class="modal-info">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// DEVICE FINGERPRINT
// ═══════════════════════════════════════════

function getDeviceFingerprint() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText('fp_yoga_budni', 2, 2);
    const canvasData = canvas.toDataURL();

    const raw = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 0,
        navigator.deviceMemory || 0,
        canvasData.slice(-50),
        (navigator.plugins ? navigator.plugins.length : 0)
    ].join('|');

    // Simple hash
    let hash = 0;
    for (let i = 0; i < raw.length; i++) {
        const c = raw.charCodeAt(i);
        hash = ((hash << 5) - hash) + c;
        hash |= 0;
    }
    return 'fp_' + Math.abs(hash).toString(36);
}

// ═══════════════════════════════════════════
// НАСТРОЙКИ — ПОЛЬЗОВАТЕЛИ
// ═══════════════════════════════════════════

// Каждый ученик — свой код
// deviceId заполнится автоматически при первом входе
// maxDevices: сколько устройств может использовать (1 = привязка к одному)
const USERS = {
    // ── Телесные практики ──
    'masha2026': {
        name: 'Маша',
        level: 'practice',
        categories: ['practice', 'short'],
        maxDevices: 1,
        deviceIds: []  // заполнится автоматически
    },
    'ivan2026': {
        name: 'Иван',
        level: 'practice',
        categories: ['practice', 'short'],
        maxDevices: 1,
        deviceIds: []
    },

    // ── Шаткармы ──
    'elena_sk': {
        name: 'Елена',
        level: 'shatkarma',
        categories: ['shatkarma', 'theory'],
        maxDevices: 1,
        deviceIds: []
    },

    // ── Полный доступ ──
    'yogafull': {
        name: 'Полный',
        level: 'full',
        categories: ['practice', 'shatkarma', 'theory', 'short'],
        maxDevices: 3,
        deviceIds: []
    },

    // ── Админ (Айса + Слава) — неограниченный ──
    'admin2026': {
        name: 'Админ',
        level: 'full',
        categories: ['practice', 'shatkarma', 'theory', 'short'],
        maxDevices: 99,
        deviceIds: [],
        isAdmin: true
    }
};

const LEVEL_NAMES = {
    practice: 'Телесные практики',
    shatkarma: 'Шаткармы',
    full: 'Полный доступ'
};

const ALL_CATEGORIES = {
    practice:  { label: '🧘 Практика' },
    shatkarma: { label: '🔥 Шаткармы' },
    theory:    { label: '📖 Теория' },
    short:     { label: '⚡ Короткие' },
};

const PRACTICES = [
    {
        title: 'Утренний комплекс - пробуждение',
        category: 'practice',
        duration: '30 мин',
        level: 'Все уровни',
        description: 'Базовый утренний комплекс. Суставная разминка, основные асаны, дыхание.',
        vkEmbed: '',
        emoji: '🌄'
    },
    {
        title: 'Работа со спиной - вытяжения и скрутки',
        category: 'practice',
        duration: '40 мин',
        level: 'Все уровни',
        description: 'Безопасная работа с позвоночником. Акцент на грудной и поясничный отделы.',
        vkEmbed: '',
        emoji: '🧘'
    },
    {
        title: 'Полная вечерняя практика',
        category: 'practice',
        duration: '50 мин',
        level: 'Средний',
        description: 'Глубокая работа с телом. Силовые элементы, балансы, длинная шавасана.',
        vkEmbed: '',
        emoji: '🌙'
    },
    {
        title: 'Экспресс-разминка перед рабочим днём',
        category: 'short',
        duration: '10 мин',
        level: 'Все уровни',
        description: 'Быстрая проработка всего тела. Когда времени мало, а тело просит движения.',
        vkEmbed: '',
        emoji: '⚡'
    },
    {
        title: 'Шанкх пракшалана - полный разбор',
        category: 'shatkarma',
        duration: '45 мин',
        level: 'Подготовленные',
        description: 'Техника полного очищения кишечника. Подготовка, выполнение, выход.',
        vkEmbed: '',
        emoji: '🔥'
    },
    {
        title: 'Капалабхати и уддияна бандха',
        category: 'shatkarma',
        duration: '20 мин',
        level: 'Средний',
        description: 'Дыхательные и очистительные техники. Правильная отстройка, типичные ошибки.',
        vkEmbed: '',
        emoji: '💨'
    },
    {
        title: 'Тратака - практика концентрации',
        category: 'shatkarma',
        duration: '15 мин',
        level: 'Все уровни',
        description: 'Очищение и укрепление глаз. Концентрация на пламени свечи.',
        vkEmbed: '',
        emoji: '🕯'
    },
    {
        title: 'Доши и питание - основы аюрведы',
        category: 'theory',
        duration: '25 мин',
        level: 'Все уровни',
        description: 'Как определить свою дошу и скорректировать питание. Без эзотерики, только практика.',
        vkEmbed: '',
        emoji: '📖'
    }
];

// ═══════════════════════════════════════════
// ЛОГИКА
// ═══════════════════════════════════════════

let currentUser = null;
let currentCode = null;
const deviceFP = getDeviceFingerprint();

function getBindings() {
    try { return JSON.parse(localStorage.getItem('yb_bindings') || '{}'); }
    catch { return {}; }
}

function saveBindings(b) {
    localStorage.setItem('yb_bindings', JSON.stringify(b));
}

function tryLogin() {
    const code = document.getElementById('passwordInput').value.trim();
    const user = USERS[code];

    if (!user) {
        document.getElementById('lockError').textContent = 'Неверный код доступа';
        document.getElementById('passwordInput').value = '';
        return false;
    }

    // Check device binding
    const bindings = getBindings();
    const bound = bindings[code] || [];

    if (bound.includes(deviceFP)) {
        // Already bound to this device — OK
    } else if (bound.length < user.maxDevices) {
        // Room for another device — bind it
        bound.push(deviceFP);
        bindings[code] = bound;
        saveBindings(bindings);
    } else {
        // Max devices reached and this isn't one of them
        document.getElementById('lockError').textContent =
            'Этот код уже привязан к другому устройству. Обратитесь к преподавателю.';
        document.getElementById('passwordInput').value = '';
        return false;
    }

    currentUser = user;
    currentCode = code;
    localStorage.setItem('yb_key', code);
    showApp();
    return false;
}

function logout() {
    localStorage.removeItem('yb_key');
    currentUser = null;
    currentCode = null;
    location.reload();
}

function hasAccess(category) {
    return currentUser && currentUser.categories.includes(category);
}

function showApp() {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    document.getElementById('accessBadge').textContent =
        LEVEL_NAMES[currentUser.level] || currentUser.level;
    buildFilters();
    renderCards('all');
}

function buildFilters() {
    const container = document.getElementById('filters');
    let html = '<button class="filter-btn active" data-cat="all">Все</button>';
    for (const [cat, info] of Object.entries(ALL_CATEGORIES)) {
        const locked = !hasAccess(cat);
        html += `<button class="filter-btn${locked ? ' locked' : ''}" data-cat="${cat}" ${locked ? 'disabled' : ''}>${info.label}${locked ? ' 🔒' : ''}</button>`;
    }
    container.innerHTML = html;
    setupFilters();
}

function renderCards(cat) {
    const grid = document.getElementById('grid');
    let list = cat === 'all' ? [...PRACTICES] : PRACTICES.filter(p => p.category === cat);

    if (cat === 'all') {
        const accessible = list.filter(p => hasAccess(p.category));
        const locked = list.filter(p => !hasAccess(p.category));
        list = [...accessible, ...locked];
    }

    if (list.length === 0) {
        grid.innerHTML = '<div class="empty"><div class="empty-icon">🧘</div><div class="empty-text">Пока нет практик в этой категории</div></div>';
        return;
    }

    grid.innerHTML = list.map((p) => {
        const locked = !hasAccess(p.category);
        const idx = PRACTICES.indexOf(p);
        return `
        <div class="card${locked ? ' is-locked' : ''}" ${locked ? '' : `onclick="openModal(${idx})"`}>
            <div class="card-lock-overlay">
                <div class="card-lock-icon">🔒</div>
                <div class="card-lock-text">Нет доступа</div>
            </div>
            <div class="card-video">
                ${!locked && p.vkEmbed
                    ? `<iframe src="${p.vkEmbed}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen></iframe>`
                    : `<div class="card-placeholder">${p.emoji || '🧘'}</div>`
                }
            </div>
            <div class="card-body">
                <span class="card-tag">${getCatLabel(p.category)}</span>
                <div class="card-title">${p.title}</div>
                <div class="card-meta">
                    <span>⏱ ${p.duration}</span>
                    <span>📊 ${p.level}</span>
                </div>
            </div>
        </div>`;
    }).join('');
}

function getCatLabel(cat) {
    return { practice: 'Практика', shatkarma: 'Шаткарма', theory: 'Теория', short: 'Короткая' }[cat] || cat;
}

function setupFilters() {
    document.querySelectorAll('.filter-btn:not(.locked)').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(btn.dataset.cat);
        });
    });
}

function openModal(idx) {
    const p = PRACTICES[idx];
    if (!hasAccess(p.category)) return;
    document.getElementById('modalTitle').textContent = p.title;
    document.getElementById('modalDesc').textContent = `${p.duration} · ${p.level} — ${p.description}`;
    document.getElementById('modalVideo').innerHTML = p.vkEmbed
        ? `<iframe src="${p.vkEmbed}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen></iframe>`
        : `<div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;background:#0a0a0a">${p.emoji || '🧘'}</div>`;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modalVideo').innerHTML = '';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Anti-copy
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return; }
    if (e.ctrlKey && (e.key === 's' || e.key === 'u' || e.key === 'c' || e.key === 'p')) { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) { e.preventDefault(); return; }
});
document.addEventListener('dragstart', e => e.preventDefault());

// Auto-login if saved
const savedKey = localStorage.getItem('yb_key');
if (savedKey && USERS[savedKey]) {
    const bindings = getBindings();
    const bound = bindings[savedKey] || [];
    if (bound.includes(deviceFP)) {
        currentUser = USERS[savedKey];
        currentCode = savedKey;
        showApp();
    } else {
        localStorage.removeItem('yb_key');
    }
}
</script>

</body>
</html>
