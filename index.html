<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Club — Айса</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #242424;
            --accent: #c4a87c;
            --accent-light: #e8d5b5;
            --text: #f0ede8;
            --text-muted: #8a8680;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Lock Screen ── */
        .lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }

        .lock-screen.hidden { display: none; }

        .lock-logo {
            font-size: 48px;
            margin-bottom: 24px;
        }

        .lock-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .lock-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .lock-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }

        .lock-input {
            background: var(--surface);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            text-align: center;
            letter-spacing: 2px;
        }

        .lock-input:focus { border-color: var(--accent); }
        .lock-input::placeholder { color: var(--text-muted); letter-spacing: 0; }

        .lock-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .lock-btn:hover { opacity: 0.9; }

        .lock-error {
            color: #e07070;
            font-size: 13px;
            min-height: 20px;
        }

        /* ── Main App ── */
        .app { display: none; }
        .app.visible { display: block; }

        /* Header */
        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 960px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon { font-size: 28px; }

        .brand-name {
            font-size: 18px;
            font-weight: 600;
        }

        .logout-btn {
            background: none;
            border: 1px solid #333;
            color: var(--text-muted);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .logout-btn:hover { border-color: var(--accent); color: var(--text); }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 24px 40px;
            max-width: 640px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .hero h1 span { color: var(--accent); }

        .hero p {
            color: var(--text-muted);
            font-size: 17px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding: 0 24px;
            max-width: 960px;
            margin: 40px auto 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text-muted);
            border-radius: 100px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover { color: var(--text); background: var(--surface-hover); }
        .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 500; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 24px 80px;
            max-width: 960px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .card-video {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #111;
        }

        .card-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .card-placeholder {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
        }

        .card-body { padding: 16px; }

        .card-tag {
            display: inline-block;
            background: rgba(196, 168, 124, 0.15);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-meta {
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            gap: 12px;
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-text { font-size: 15px; }

        /* Modal / Video Player */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            width: 100%;
            max-width: 800px;
        }

        .modal-video {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .modal-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-info { padding: 20px 0; }
        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .modal-desc { color: var(--text-muted); font-size: 14px; }

        .modal-close {
            position: fixed;
            top: 20px; right: 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 32px;
            cursor: pointer;
            z-index: 101;
        }

        .modal-close:hover { color: var(--text); }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid #1f1f1f;
            max-width: 960px;
            margin: 0 auto;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero h1 { font-size: 30px; }
            .grid { grid-template-columns: 1fr; }
            .hero { padding: 40px 20px 24px; }
        }
    </style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
    <div class="lock-logo">🧘‍♀️</div>
    <div class="lock-title">Good Morning Club</div>
    <div class="lock-subtitle">Закрытый клуб — вход по паролю</div>
    <form class="lock-form" onsubmit="return tryLogin()">
        <input type="password" class="lock-input" id="passwordInput" placeholder="Пароль" autocomplete="off">
        <button type="submit" class="lock-btn">Войти</button>
        <div class="lock-error" id="lockError"></div>
    </form>
</div>

<!-- Main App -->
<div class="app" id="app">
    <header class="header">
        <div class="brand">
            <span class="brand-icon">🧘‍♀️</span>
            <span class="brand-name">Good Morning Club</span>
        </div>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </header>

    <section class="hero">
        <h1>Твоя <span>утренняя практика</span></h1>
        <p>Безопасная хатха-йога — грамотные отстройки, физиология, без эзотерики. Практикуй в своём темпе.</p>
    </section>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">Все</button>
        <button class="filter-btn" data-cat="morning">🌅 Утренние</button>
        <button class="filter-btn" data-cat="evening">🌙 Вечерние</button>
        <button class="filter-btn" data-cat="short">⚡ Короткие</button>
        <button class="filter-btn" data-cat="full">🕐 Полные</button>
    </div>

    <div class="grid" id="grid"></div>

    <footer class="footer">
        Good Morning Club · Айса · Хатха-йога онлайн
    </footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal">
        <div class="modal-video" id="modalVideo"></div>
        <div class="modal-info">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// НАСТРОЙКИ — меняй здесь!
// ═══════════════════════════════════════════

// Пароль для входа (поменяй на свой)
const PASSWORD = 'goodmorning';

// Практики — добавляй сюда новые видео
// vkEmbed: ссылка из VK → "Код для встраивания" (скопируй src из iframe)
// Категории: morning, evening, short, full
const PRACTICES = [
    // ── ПРИМЕР (удали и добавь свои) ──
    {
        title: 'Утренний комплекс — мягкий старт',
        category: 'morning',
        duration: '25 мин',
        level: 'Начинающие',
        description: 'Мягкая утренняя практика для пробуждения тела. Акцент на дыхание и плавные движения.',
        vkEmbed: '',  // ← сюда вставь VK embed ссылку
        emoji: '🌅'
    },
    {
        title: 'Полная утренняя практика',
        category: 'morning',
        duration: '45 мин',
        level: 'Средний',
        description: 'Развёрнутая практика с разминкой, основным блоком и шавасаной.',
        vkEmbed: '',
        emoji: '☀️'
    },
    {
        title: 'Вечернее расслабление',
        category: 'evening',
        duration: '20 мин',
        level: 'Все уровни',
        description: 'Мягкие растяжки и дыхательные техники перед сном.',
        vkEmbed: '',
        emoji: '🌙'
    },
    {
        title: 'Экспресс-разминка',
        category: 'short',
        duration: '10 мин',
        level: 'Все уровни',
        description: 'Быстрая разминка для тех, кто торопится. Всё тело за 10 минут.',
        vkEmbed: '',
        emoji: '⚡'
    },
    {
        title: 'Полная практика — сила и баланс',
        category: 'full',
        duration: '60 мин',
        level: 'Средний',
        description: 'Глубокая работа с балансовыми асанами и силовыми элементами.',
        vkEmbed: '',
        emoji: '🔥'
    },
    {
        title: 'Утро для спины',
        category: 'morning',
        duration: '30 мин',
        level: 'Все уровни',
        description: 'Прорабатываем спину — вытяжения, скрутки, укрепление.',
        vkEmbed: '',
        emoji: '🌿'
    }
];

// ═══════════════════════════════════════════
// ЛОГИКА (не трогай, если не нужно)
// ═══════════════════════════════════════════

function tryLogin() {
    const input = document.getElementById('passwordInput').value;
    if (input === PASSWORD) {
        localStorage.setItem('gmc_auth', 'true');
        showApp();
    } else {
        document.getElementById('lockError').textContent = 'Неверный пароль';
        document.getElementById('passwordInput').value = '';
    }
    return false;
}

function logout() {
    localStorage.removeItem('gmc_auth');
    location.reload();
}

function showApp() {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    renderCards('all');
    setupFilters();
}

function renderCards(cat) {
    const grid = document.getElementById('grid');
    const filtered = cat === 'all' ? PRACTICES : PRACTICES.filter(p => p.category === cat);

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty"><div class="empty-icon">🧘</div><div class="empty-text">Пока нет практик в этой категории</div></div>';
        return;
    }

    grid.innerHTML = filtered.map((p, i) => `
        <div class="card" onclick="openModal(${PRACTICES.indexOf(p)})">
            <div class="card-video">
                ${p.vkEmbed
                    ? `<iframe src="${p.vkEmbed}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen></iframe>`
                    : `<div class="card-placeholder">${p.emoji || '🧘'}</div>`
                }
            </div>
            <div class="card-body">
                <span class="card-tag">${getCatLabel(p.category)}</span>
                <div class="card-title">${p.title}</div>
                <div class="card-meta">
                    <span>⏱ ${p.duration}</span>
                    <span>📊 ${p.level}</span>
                </div>
            </div>
        </div>
    `).join('');
}

function getCatLabel(cat) {
    return { morning: 'Утренняя', evening: 'Вечерняя', short: 'Короткая', full: 'Полная' }[cat] || cat;
}

function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(btn.dataset.cat);
        });
    });
}

function openModal(idx) {
    const p = PRACTICES[idx];
    const modal = document.getElementById('modal');
    document.getElementById('modalTitle').textContent = p.title;
    document.getElementById('modalDesc').textContent = `${p.duration} · ${p.level} — ${p.description}`;
    document.getElementById('modalVideo').innerHTML = p.vkEmbed
        ? `<iframe src="${p.vkEmbed}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen></iframe>`
        : `<div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:#111">${p.emoji || '🧘'}</div>`;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modalVideo').innerHTML = '';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Auto-login if remembered
if (localStorage.getItem('gmc_auth') === 'true') {
    showApp();
}
</script>

</body>
</html>
